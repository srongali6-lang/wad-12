<!DOCTYPE html>
<html>

<head>
<title>AngularJS Counter</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

</head>

<body  ng-app="">

<button ng-init="count=0" ng-click="count = count + 1">
Click Me
</button>

<p>Counter Value : {{count}}</p>

</body>
</html>
